<!--
  NiftyStats favicon.

  Tiny by design: rounded slate-950 square with an emerald dot, mirroring the
  brand glyph in the header. At 16x16 it reads as "small green dot on dark
  square" which is exactly the kind of signal we want in a browser tab.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#020617"/>
  <circle cx="16" cy="16" r="5" fill="#10b981"/>
  <circle cx="16" cy="16" r="8" fill="#10b981" fill-opacity="0.18"/>
</svg>
